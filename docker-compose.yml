version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: astra-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: astra_quant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: astra-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: astra-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/astra_quant?schema=public
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=astra-quant-secret-key-institutional-grade-secure-key-2026
      - JWT_REFRESH_SECRET=astra-quant-refresh-secret-key-institutional-grade-secure-key-2026
      - ALLOWED_ORIGINS=http://localhost,http://localhost:3000
    depends_on:
      - db
      - redis

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: astra-engine
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/astra_quant?schema=public
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JWT_SECRET=astra-quant-secret-key-institutional-grade-secure-key-2026
    depends_on:
      - db
      - redis

volumes:
  pgdata:
