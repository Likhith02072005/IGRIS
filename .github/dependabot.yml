version: 2
updates:
  # Enable npm dependency updates for Express backend
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"

  # Enable npm dependency updates for NextJS frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  # Enable pip dependency updates for FastAPI engine
  - package-ecosystem: "pip"
    directory: "/engine"
    schedule:
      interval: "weekly"

  # Enable docker dependency updates
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  # Enable GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
