name: IGRIS CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Frontend verification checks
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

  # 2. Backend Gateway verification checks
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Verify Prisma schemas
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/igris_quant?schema=public"
        run: |
          cd backend
          npx prisma validate --schema=../database/prisma/schema.prisma

      - name: Build TypeScript
        run: |
          cd backend
          npx tsc --noEmit

  # 3. Python Quant Engine validation
  engine-check:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/engine
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd engine
          pip install -r requirements.txt

      - name: Run import checks
        run: |
          cd engine
          python test_load.py

      - name: Run unit tests suite
        run: |
          cd engine
          python -m unittest discover -s tests -p "test_*.py"

  # 4. Docker compose build validation
  docker-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate Docker Compose Config
        run: |
          docker compose config
